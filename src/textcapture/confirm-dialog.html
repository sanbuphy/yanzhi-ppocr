<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文字捕获确认</title>
  <style>
    :root {
      --bg: #11151a;
      --panel: #1a222b;
      --muted: #9cb0c3;
      --text: #f3f7fb;
      --line: #2b3948;
      --accent: #22a46f;
      --accent-hover: #2fbe82;
      --secondary: #3a4d62;
      --secondary-hover: #4a627b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top right, #1d2a37 0%, var(--bg) 56%);
      color: var(--text);
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      height: 100vh;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .dragbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 34px;
      padding: 0 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #1c2630 0%, #17212b 100%);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.2px;
      -webkit-app-region: drag;
      user-select: none;
    }

    .dragbar .hint {
      opacity: 0.9;
      font-size: 11px;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: calc(100% - 34px);
      padding: 16px;
      gap: 12px;
    }

    .title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.4px;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .panels {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      gap: 10px;
    }

    .panel {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      gap: 6px;
    }

    .panel-title {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.3px;
    }

    .preview {
      flex: 1;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      padding: 12px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
      font-size: 13px;
      color: var(--text);
      resize: none;
      outline: none;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      -webkit-app-region: no-drag;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.15s ease;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-copy {
      background: var(--secondary);
    }

    .btn-copy:hover:not(:disabled) {
      background: var(--secondary-hover);
    }

    .btn-cancel {
      background: #5c3340;
    }

    .btn-cancel:hover:not(:disabled) {
      background: #734052;
    }

    .btn-save {
      background: var(--accent);
    }

    .btn-save:hover:not(:disabled) {
      background: var(--accent-hover);
    }
  </style>
</head>
<body>
  <div class="dragbar">
    <span>文字捕获确认窗</span>
    <span class="hint">拖动此处可移动窗口</span>
  </div>
  <div class="container">
    <h1 class="title">已捕获文字</h1>
    <p class="subtitle">上方为原文，下方为 AI 解释</p>
    <div class="panels">
      <div class="panel">
        <p class="panel-title">原始文本</p>
        <textarea id="originalText" class="preview" readonly placeholder="暂无原始文本"></textarea>
      </div>
      <div class="panel">
        <p class="panel-title">AI 解释</p>
        <textarea id="explanationText" class="preview" readonly placeholder="正在生成 AI 解释..."></textarea>
      </div>
    </div>
    <div class="actions">
      <button id="cancel" class="btn-cancel">取消</button>
      <button id="copyText" class="btn-copy">复制文本</button>
      <button id="copyExplanation" class="btn-copy">复制解释</button>
      <button id="autoSave" class="btn-save">自动保存</button>
    </div>
  </div>

  <script src="./confirm-dialog.js"></script>
</body>
</html>
