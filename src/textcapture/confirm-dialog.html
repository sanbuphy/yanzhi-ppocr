<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文字捕获确认</title>
  <style>
    :root {
      --bg: #11151a;
      --panel: #1a222b;
      --muted: #9cb0c3;
      --text: #f3f7fb;
      --line: #2b3948;
      --accent: #22a46f;
      --accent-hover: #2fbe82;
      --secondary: #3a4d62;
      --secondary-hover: #4a627b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top right, #1d2a37 0%, var(--bg) 56%);
      color: var(--text);
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      height: 100vh;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .dragbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 34px;
      padding: 0 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #1c2630 0%, #17212b 100%);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.2px;
      -webkit-app-region: drag;
      user-select: none;
    }

    .dragbar .hint {
      opacity: 0.9;
      font-size: 11px;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: calc(100% - 34px);
      padding: 16px;
      gap: 10px;
    }

    .title {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.4px;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .panels {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      gap: 8px;
    }

    .panel {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      gap: 4px;
    }

    .panel-title {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.3px;
    }

    .preview {
      flex: 1;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 10px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
      font-size: 12px;
      color: var(--text);
      resize: none;
      outline: none;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    .save-section {
      margin-top: 4px;
    }

    .save-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .save-input {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 11px;
      color: var(--text);
      outline: none;
      font-family: "Segoe UI", monospace;
    }

    .save-input:focus {
      border-color: var(--accent);
    }

    .save-input::placeholder {
      color: var(--muted);
    }

    .browse-btn {
      background: var(--secondary);
      border: none;
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .browse-btn:hover {
      background: var(--secondary-hover);
    }

    .classify-info {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
      padding: 4px 8px;
      background: rgba(34, 164, 111, 0.1);
      border-radius: 4px;
      border-left: 3px solid var(--accent);
    }

    .classify-info.error {
      background: rgba(229, 115, 115, 0.1);
      border-left-color: #e57373;
      color: #e57373;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    button {
      border: none;
      border-radius: 6px;
      padding: 8px 12px;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.15s ease;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-copy {
      background: var(--secondary);
    }

    .btn-copy:hover:not(:disabled) {
      background: var(--secondary-hover);
    }

    .btn-cancel {
      background: #5c3340;
    }

    .btn-cancel:hover:not(:disabled) {
      background: #734052;
    }

    .btn-save {
      background: var(--accent);
    }

    .btn-save:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    /* Toast 提示 */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 1000;
      text-align: center;
    }

    .toast.success {
      background: rgba(34, 164, 111, 0.95);
    }

    .toast.error {
      background: rgba(229, 115, 115, 0.95);
    }

    /* Markdown Content Styles */
    .markdown-content h1 {
      font-size: 20px;
      font-weight: 700;
      margin: 16px 0 12px;
      color: var(--text);
    }

    .markdown-content h2 {
      font-size: 18px;
      font-weight: 600;
      margin: 14px 0 10px;
      color: var(--text);
    }

    .markdown-content h3 {
      font-size: 16px;
      font-weight: 600;
      margin: 12px 0 8px;
      color: var(--text);
    }

    .markdown-content p {
      margin: 8px 0;
      line-height: 1.6;
    }

    .markdown-content ul,
    .markdown-content ol {
      margin: 10px 0;
      padding-left: 20px;
    }

    .markdown-content li {
      margin: 4px 0;
      line-height: 1.5;
    }

    .markdown-content code {
      background: rgba(34, 164, 111, 0.15);
      border-radius: 3px;
      padding: 1px 4px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 12px;
      color: #90ee90;
    }

    .markdown-content pre {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 6px;
      padding: 10px;
      overflow-x: auto;
      margin: 10px 0;
    }

    .markdown-content pre code {
      background: transparent;
      padding: 0;
      color: var(--text);
    }

    .markdown-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      margin: 10px 0;
      color: var(--muted);
      font-style: italic;
    }

    .markdown-content strong {
      font-weight: 600;
      color: var(--text);
    }

    .markdown-content em {
      font-style: italic;
      color: var(--muted);
    }

    .markdown-content a {
      color: var(--accent);
      text-decoration: none;
    }

    .markdown-content a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="dragbar">
    <span>文字捕获确认窗</span>
    <span class="hint">拖动此处可移动窗口</span>
  </div>
  <div class="container">
    <h1 class="title">已捕获文字</h1>
    <p class="subtitle">上方为原文，下方为 AI 解释</p>
    <div class="panels">
      <div class="panel" style="flex: 0.8;">
        <p class="panel-title">原始文本</p>
        <textarea id="originalText" class="preview" readonly placeholder="暂无原始文本"></textarea>
      </div>
      <div class="panel" style="flex: 1;">
        <p class="panel-title">AI 解释</p>
        <div id="explanationText" class="preview markdown-content" placeholder="正在生成 AI 解释..."></div>
      </div>
    </div>
    <div class="save-section">
      <p class="panel-title">保存到文件</p>
      <div class="save-row">
        <input type="text" id="savePath" class="save-input" placeholder="选择或输入 .md/.txt 文件路径">
        <button class="browse-btn" id="browseBtn">浏览...</button>
      </div>
      <div class="classify-info" id="classifyInfo"></div>
    </div>
    <div class="actions">
      <button id="cancel" class="btn-cancel">取消</button>
      <button id="copyText" class="btn-copy">复制文本</button>
      <button id="copyExplanation" class="btn-copy">复制解释</button>
      <button id="autoSave" class="btn-save">保存到文件</button>
    </div>
  </div>

  <script src="./confirm-dialog.js"></script>
</body>
</html>
