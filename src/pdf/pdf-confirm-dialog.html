<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 保存成功 - 研知科研助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 28px 32px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header .icon {
            font-size: 42px;
            margin-bottom: 8px;
        }

        .header h1 {
            color: #22c55e;
            font-size: 20px;
            margin-bottom: 6px;
        }

        .header p {
            color: #666;
            font-size: 13px;
        }

        .path-info {
            background: #f8f9fa;
            padding: 14px 16px;
            border-radius: 8px;
            margin-bottom: 18px;
            word-break: break-all;
            font-size: 13px;
            color: #555;
        }

        .page-title {
            color: #333;
            font-weight: 500;
            margin-bottom: 6px;
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-path {
            color: #888;
            font-size: 11px;
            line-height: 1.5;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(34, 197, 94, 0.4);
        }

        .btn-secondary {
            background: #3b82f6;
            color: white;
        }

        .btn-secondary:hover {
            background: #2563eb;
        }

        /* 允许拖拽窗口 */
        .header {
            -webkit-app-region: drag;
        }

        .btn-group, .path-info {
            -webkit-app-region: no-drag;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">✅</div>
            <h1>PDF 已保存</h1>
            <p>网页已成功转换为 PDF 文件</p>
        </div>

        <div class="path-info">
            <div class="page-title" id="pageTitle">加载中...</div>
            <div class="file-path" id="filePath">加载中...</div>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" id="confirm-btn">确认</button>
            <button class="btn btn-secondary" id="open-folder-btn">打开文件夹</button>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        // 接收数据
        ipcRenderer.on('dialog:data', (event, data) => {
            document.getElementById('pageTitle').textContent = data.title || '网页';
            document.getElementById('filePath').textContent = data.path;
        });

        // 确认按钮
        document.getElementById('confirm-btn').addEventListener('click', () => {
            ipcRenderer.send('pdf-confirm:confirm');
        });

        // 打开文件夹按钮
        document.getElementById('open-folder-btn').addEventListener('click', () => {
            ipcRenderer.send('pdf-confirm:open-folder');
        });

        // ESC 关闭
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                ipcRenderer.send('pdf-confirm:confirm');
            }
        });
    </script>
</body>
</html>
