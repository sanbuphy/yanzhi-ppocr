<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑截图 - 研知科研助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #121212;
            color: #fff;
            font-family: "Microsoft YaHei", sans-serif;
        }

        #container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #window-dragbar {
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            background: linear-gradient(180deg, #262626 0%, #1f1f1f 100%);
            border-bottom: 1px solid #343434;
            -webkit-app-region: drag;
            user-select: none;
            flex-shrink: 0;
        }

        #window-dragbar .title {
            font-size: 12px;
            color: #d8d8d8;
            letter-spacing: 0.2px;
        }

        #window-dragbar .hint {
            font-size: 11px;
            color: #9a9a9a;
        }

        #stage {
            flex: 1;
            background: rgba(8, 8, 8, 0.88);
            padding: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-app-region: no-drag;
        }

        #canvas-shell {
            position: relative;
            border: 1px solid #303030;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.45);
            background: #1e1e1e;
            max-width: 100%;
            max-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #base-canvas {
            display: block;
            background: #2f2f2f;
            position: relative;
            z-index: 1;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        #draw-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            cursor: crosshair;
        }

        #eraser-cursor {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.9);
            border-radius: 999px;
            background: transparent;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.75);
            pointer-events: none;
            z-index: 4;
            display: none;
            transform: translate(-50%, -50%);
        }

        .text-input {
            position: absolute;
            min-width: 80px;
            max-width: 360px;
            padding: 2px 6px;
            border: 1px dashed rgba(255, 255, 255, 0.65);
            background: rgba(0, 0, 0, 0.6);
            color: #ffffff;
            outline: none;
            font-family: "Microsoft YaHei", sans-serif;
            line-height: 1.4;
            z-index: 5;
        }

        #toolbar {
            height: 66px;
            background: #232323;
            border-top: 1px solid #3e3e3e;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0 18px;
            flex-wrap: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-app-region: no-drag;
        }

        .tool-group {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: nowrap;
            flex-shrink: 0;
        }

        .tool-group.actions {
            margin-left: auto;
        }

        .tool-btn {
            border: none;
            border-radius: 6px;
            background: #444;
            color: #fff;
            cursor: pointer;
            transition: background 0.2s;
            height: 38px;
            min-width: 38px;
            padding: 0 12px;
            font-size: 14px;
            white-space: nowrap;
            word-break: keep-all;
            flex-shrink: 0;
        }

        .tool-btn:hover {
            background: #5a5a5a;
        }

        .tool-btn.active {
            background: #0078d4;
        }

        .tool-btn.primary {
            background: #4caf50;
        }

        .tool-btn.primary:hover {
            background: #43a047;
        }

        .tool-btn.warn {
            background: #9c27b0;
        }

        .tool-btn.warn:hover {
            background: #8e24aa;
        }

        .tool-btn.cancel {
            background: #f44336;
        }

        .tool-btn.cancel:hover {
            background: #e53935;
        }

        .color-picker {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .color-btn {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .color-btn.active {
            border-color: #fff;
        }

        .size-slider {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #b7b7b7;
            font-size: 12px;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .size-slider input[type="range"] {
            width: 120px;
            flex-shrink: 0;
        }

        #loading {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.45);
            z-index: 2000;
        }

        #loading .loading-content {
            background: rgba(0, 0, 0, 0.86);
            padding: 16px 24px;
            border-radius: 8px;
            border: 1px solid #4c4c4c;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        #loading .loading-text {
            font-size: 14px;
            color: #fff;
        }

        #loading .loading-hint {
            font-size: 12px;
            color: #888;
        }

        #result-modal {
            position: fixed;
            inset: 0;
            display: none;
            z-index: 2600;
            overflow: hidden;
        }

        #result-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.62);
        }

        #result-panel {
            position: relative;
            width: min(760px, calc(100vw - 36px));
            max-height: min(78vh, 680px);
            display: flex;
            flex-direction: column;
            background: #1f1f1f;
            border: 1px solid #3a3a3a;
            border-radius: 10px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.6);
            overflow: hidden;
        }

        #result-header {
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            border-bottom: 1px solid #333;
            color: #f1f1f1;
            font-size: 14px;
            font-weight: 600;
            cursor: move;
            user-select: none;
        }

        #result-content {
            padding: 12px 14px;
            overflow: auto;
            white-space: pre-wrap;
            line-height: 1.55;
            color: #e8e8e8;
            font-size: 13px;
            user-select: text;
        }

        .audit-section {
            border: 1px solid #383838;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #232323;
        }

        .audit-section > summary {
            cursor: pointer;
            padding: 10px 12px;
            font-size: 13px;
            color: #f2f2f2;
            user-select: none;
            outline: none;
        }

        .audit-section > summary::-webkit-details-marker {
            color: #bbbbbb;
        }

        .audit-pre {
            margin: 0;
            padding: 0 12px 12px;
            white-space: pre-wrap;
            word-break: break-word;
            color: #e2e2e2;
            font-size: 12px;
            line-height: 1.6;
            font-family: Consolas, "Courier New", monospace;
        }

        .audit-extra {
            margin-bottom: 10px;
            color: #dbdbdb;
            font-size: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        #result-actions {
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            padding: 0 14px;
            border-top: 1px solid #333;
        }

        .result-btn {
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: #fff;
            font-size: 13px;
            height: 34px;
            padding: 0 12px;
            min-width: 88px;
        }

        .result-btn.copy {
            background: #2e7d32;
        }

        .result-btn.copy:hover {
            background: #256a2a;
        }

        .result-btn.close {
            background: #4d4d4d;
        }

        .result-btn.close:hover {
            background: #5d5d5d;
        }

        #result-close-x {
            cursor: pointer;
            border: none;
            background: transparent;
            color: #d8d8d8;
            font-size: 18px;
            line-height: 1;
            padding: 2px 4px;
        }

        #result-close-x:hover {
            color: #fff;
        }

        /* Toast 通知样式 */
        #toast-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3000;
            pointer-events: none;
        }

        .toast {
            background: rgba(0, 0, 0, 0.88);
            color: #fff;
            padding: 20px 32px;
            border-radius: 12px;
            font-size: 16px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: toastFadeInOut 2s ease-in-out forwards;
            max-width: 80vw;
            word-break: break-word;
        }

        .toast.success {
            background: rgba(46, 125, 50, 0.95);
            border-color: rgba(76, 175, 80, 0.3);
        }

        .toast.error {
            background: rgba(198, 40, 40, 0.95);
            border-color: rgba(244, 67, 54, 0.3);
        }

        .toast.info {
            background: rgba(25, 118, 210, 0.95);
            border-color: rgba(33, 150, 243, 0.3);
        }

        .toast .icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .toast .message {
            font-size: 15px;
            line-height: 1.5;
        }

        @keyframes toastFadeInOut {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            15% {
                opacity: 1;
                transform: scale(1);
            }
            85% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(0.9);
            }
        }

        /* 保存确认面板样式 */
        #save-panel {
            position: fixed;
            inset: 0;
            display: none;
            z-index: 2700;
            overflow: hidden;
        }

        #save-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.62);
        }

        #save-panel-content {
            position: relative;
            width: min(680px, calc(100vw - 36px));
            max-height: min(85vh, 720px);
            display: flex;
            flex-direction: column;
            background: #1f1f1f;
            border: 1px solid #3a3a3a;
            border-radius: 10px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.6);
            overflow: hidden;
        }

        #save-header {
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            border-bottom: 1px solid #333;
            color: #f1f1f1;
            font-size: 14px;
            font-weight: 600;
            cursor: move;
            user-select: none;
        }

        #save-close-x {
            cursor: pointer;
            border: none;
            background: transparent;
            color: #d8d8d8;
            font-size: 18px;
            line-height: 1;
            padding: 2px 4px;
        }

        #save-close-x:hover {
            color: #fff;
        }

        #save-body {
            padding: 12px 14px;
            overflow: auto;
            flex: 1;
        }

        .save-section {
            margin-bottom: 12px;
        }

        .save-label {
            display: block;
            font-size: 12px;
            color: #9cb0c3;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .save-preview {
            background: #232323;
            border: 1px solid #383838;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 13px;
            color: #e8e8e8;
            line-height: 1.55;
            max-height: 140px;
            overflow: auto;
            word-break: break-word;
        }

        /* Markdown Content Styles for save-preview */
        .save-preview h1 {
            font-size: 18px;
            font-weight: 700;
            margin: 12px 0 8px;
            color: #fff;
        }

        .save-preview h2 {
            font-size: 16px;
            font-weight: 600;
            margin: 10px 0 6px;
            color: #fff;
        }

        .save-preview h3 {
            font-size: 14px;
            font-weight: 600;
            margin: 8px 0 4px;
            color: #fff;
        }

        .save-preview p {
            margin: 6px 0;
            line-height: 1.5;
        }

        .save-preview ul,
        .save-preview ol {
            margin: 8px 0;
            padding-left: 18px;
        }

        .save-preview li {
            margin: 3px 0;
            line-height: 1.4;
        }

        .save-preview code {
            background: rgba(0, 120, 212, 0.15);
            border-radius: 3px;
            padding: 1px 4px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 12px;
            color: #7dd3fc;
        }

        .save-preview pre {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            padding: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .save-preview pre code {
            background: transparent;
            padding: 0;
            color: #e8e8e8;
        }

        .save-preview blockquote {
            border-left: 3px solid #0078d4;
            padding-left: 10px;
            margin: 8px 0;
            color: #aaa;
            font-style: italic;
        }

        .save-preview strong {
            font-weight: 600;
            color: #fff;
        }

        .save-preview em {
            font-style: italic;
            color: #ccc;
        }

        .save-preview a {
            color: #0078d4;
            text-decoration: none;
        }

        .save-preview a:hover {
            text-decoration: underline;
        }

        .save-path-row {
            display: flex;
            gap: 8px;
        }

        .save-path-input {
            flex: 1;
            background: #232323;
            border: 1px solid #383838;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 13px;
            color: #e8e8e8;
            outline: none;
        }

        .save-path-input:focus {
            border-color: #0078d4;
        }

        .save-browse-btn {
            background: #444;
            border: none;
            border-radius: 6px;
            padding: 8px 14px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .save-browse-btn:hover {
            background: #5a5a5a;
        }

        #save-actions {
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            padding: 0 14px;
            border-top: 1px solid #333;
        }

        .save-btn {
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: #fff;
            font-size: 13px;
            height: 34px;
            padding: 0 16px;
            min-width: 88px;
        }

        .save-btn.cancel {
            background: #4d4d4d;
        }

        .save-btn.cancel:hover {
            background: #5d5d5d;
        }

        .save-btn.confirm {
            background: #22a46f;
        }

        .save-btn.confirm:hover {
            background: #2fbe82;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="window-dragbar">
            <span class="title">截图编辑器</span>
            <span class="hint">拖动此栏可移动窗口</span>
        </div>

        <div id="stage">
            <div id="canvas-shell">
                <canvas id="base-canvas"></canvas>
                <canvas id="draw-canvas"></canvas>
                <div id="eraser-cursor"></div>
            </div>
        </div>

        <div id="toolbar">
            <div class="tool-group" id="draw-tools">
                <button class="tool-btn active" data-tool="pen" title="画笔">画笔</button>
                <button class="tool-btn" data-tool="highlight" title="高亮">高亮</button>
                <button class="tool-btn" data-tool="text" title="文字">文字</button>
                <button class="tool-btn" data-tool="eraser" title="橡皮">橡皮</button>
            </div>

            <div class="tool-group color-picker">
                <div class="color-btn active" style="background:#ff0000" data-color="#ff0000"></div>
                <div class="color-btn" style="background:#000000" data-color="#000000"></div>
                <div class="color-btn" style="background:#0000ff" data-color="#0000ff"></div>
                <div class="color-btn" style="background:#00ff00" data-color="#00ff00"></div>
                <div class="color-btn" style="background:#ffff00" data-color="#ffff00"></div>
                <div class="color-btn" style="background:#ff00ff" data-color="#ff00ff"></div>
            </div>

            <div class="tool-group size-slider">
                <span>粗细:</span>
                <input type="range" id="size-slider" min="1" max="20" value="3">
                <span id="size-value">3</span>
            </div>

            <div class="tool-group actions">
                <button class="tool-btn" id="ai-btn">AI解读</button>
                <button class="tool-btn primary" id="finish-btn">完成</button>
                <button class="tool-btn cancel" id="cancel-btn">取消</button>
            </div>
        </div>
    </div>

    <div id="loading">
        <div class="loading-content">
            <span class="loading-text">AI 正在处理中...</span>
            <span class="loading-hint">按 ESC 取消</span>
        </div>
    </div>

    <div id="toast-container"></div>

    <div id="result-modal">
        <div id="result-backdrop"></div>
        <div id="result-panel">
            <div id="result-header">
                <span id="result-title">结果</span>
                <button id="result-close-x" title="关闭">×</button>
            </div>
            <div id="result-content"></div>
            <div id="result-actions">
                <button class="result-btn copy" id="result-copy-btn">复制内容</button>
                <button class="result-btn close" id="result-close-btn">关闭</button>
            </div>
        </div>
    </div>

    <!-- 新的保存确认面板 -->
    <div id="save-panel">
        <div id="save-backdrop"></div>
        <div id="save-panel-content">
            <div id="save-header">
                <span id="save-title">AI 解读与保存</span>
                <button id="save-close-x" title="关闭">×</button>
            </div>
            <div id="save-body">
                <div class="save-section">
                    <label class="save-label">OCR 文本</label>
                    <div id="save-ocr-text" class="save-preview"></div>
                </div>
                <div class="save-section">
                    <label class="save-label">AI 解读</label>
                    <div id="save-ai-text" class="save-preview"></div>
                </div>
                <div class="save-section">
                    <label class="save-label">保存路径</label>
                    <div class="save-path-row">
                        <input type="text" id="save-path-input" class="save-path-input" placeholder="请先选择文件夹">
                        <button id="save-browse-btn" class="save-browse-btn">浏览...</button>
                    </div>
                </div>
            </div>
            <div id="save-actions">
                <button class="save-btn cancel" id="save-cancel-btn">取消</button>
                <button class="save-btn confirm" id="save-confirm-btn">保存</button>
            </div>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        const path = require('path');

        const baseCanvas = document.getElementById('base-canvas');
        const baseCtx = baseCanvas.getContext('2d');
        const drawCanvas = document.getElementById('draw-canvas');
        const ctx = drawCanvas.getContext('2d');
        const canvasShell = document.getElementById('canvas-shell');
        const loading = document.getElementById('loading');
        const resultModal = document.getElementById('result-modal');
        const resultTitle = document.getElementById('result-title');
        const resultContent = document.getElementById('result-content');
        const resultPanel = document.getElementById('result-panel');
        const resultHeader = document.getElementById('result-header');
        const resultCopyBtn = document.getElementById('result-copy-btn');
        const resultCloseBtn = document.getElementById('result-close-btn');
        const resultCloseX = document.getElementById('result-close-x');
        const resultBackdrop = document.getElementById('result-backdrop');
        const eraserCursor = document.getElementById('eraser-cursor');

        let img = new Image();
        let currentTool = 'pen';
        let currentColor = '#ff0000';
        let lineWidth = 3;
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let activeTextInput = null;
        let lastModalText = '';
        let isDraggingResultPanel = false;
        let dragPanelOffsetX = 0;
        let dragPanelOffsetY = 0;
        let canvasScale = 1; // 画布缩放比例
        const DEBUG_TEXT_TOOL = true;

        function logTextTool(message, extra = null) {
            if (!DEBUG_TEXT_TOOL) {
                return;
            }
            if (extra === null) {
                console.log(`[TextTool] ${message}`);
                return;
            }
            console.log(`[TextTool] ${message}`, extra);
        }

        function buildMergedCanvas() {
            const merged = document.createElement('canvas');
            merged.width = baseCanvas.width;
            merged.height = baseCanvas.height;
            const mergedCtx = merged.getContext('2d');
            mergedCtx.drawImage(baseCanvas, 0, 0);
            mergedCtx.drawImage(drawCanvas, 0, 0);
            return merged;
        }

        function getCanvasDataUrl() {
            return buildMergedCanvas().toDataURL('image/png');
        }

        function setLoading(visible) {
            loading.style.display = visible ? 'flex' : 'none';
        }

        function hideResultModal() {
            resultModal.style.display = 'none';
        }

        async function copyText(text) {
            if (!text) {
                return;
            }
            try {
                await navigator.clipboard.writeText(text);
                const oldText = resultCopyBtn.textContent;
                resultCopyBtn.textContent = '已复制';
                setTimeout(() => {
                    resultCopyBtn.textContent = oldText;
                }, 1200);
            } catch (error) {
                console.warn('复制失败:', error);
                resultCopyBtn.textContent = '复制失败';
                setTimeout(() => {
                    resultCopyBtn.textContent = '复制内容';
                }, 1200);
            }
        }

        function showResultModal(title, content, options = {}) {
            resultTitle.textContent = title || '结果';
            resultContent.innerHTML = '';
            resultContent.textContent = content || '';
            lastModalText = content || '';

            const hideCopy = options.hideCopy === true;
            resultCopyBtn.style.display = hideCopy ? 'none' : 'inline-block';
            resultCopyBtn.textContent = '复制内容';

            resultModal.style.display = 'block';

            const panelWidth = Math.min(760, window.innerWidth - 36);
            const top = Math.max(20, Math.round((window.innerHeight - Math.min(680, window.innerHeight * 0.78)) / 2));
            const left = Math.max(18, Math.round((window.innerWidth - panelWidth) / 2));
            resultPanel.style.position = 'absolute';

        function escapeHtml(text) {
            return String(text || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizeMarkdownBlock(raw) {
            const text = String(raw || '').trim();
            if (!text) {
                return '';
            }
            if (text.startsWith('```')) {
                return text.replace(/^```[a-zA-Z0-9]*\n?/, '').replace(/```$/, '').trim();
            }
            return text;
        }

        function markdownOrFallback(raw) {
            const normalized = normalizeMarkdownBlock(raw);
            return normalized || '无';
        }

        function truncateForModal(raw, maxLength = 6000) {
            const text = String(raw || '');
            if (text.length <= maxLength) {
                return text;
            }
            return `${text.slice(0, maxLength)}\n\n...（内容较长，已截断显示，共 ${text.length} 字符）`;
        }

        function prettyJson(raw) {
            if (!raw) {
                return '未提供';
            }
            try {
                return JSON.stringify(raw, null, 2);
            } catch (error) {
                return `序列化失败: ${error.message || String(error)}`;
            }
        }

        function commitActiveTextInput() {
            if (!activeTextInput) {
                return;
            }

            const input = activeTextInput;
            const text = input.value.trim();
            const x = parseFloat(input.dataset.x || '0');
            const y = parseFloat(input.dataset.y || '0');
            const color = input.dataset.color || currentColor;
            const size = parseInt(input.dataset.size || '16', 10);
            logTextTool('commitActiveTextInput called', { text, x, y, color, size });

            input.remove();
            activeTextInput = null;

            if (!text) {
                return;
            }

            ctx.save();
            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = 1;
            ctx.fillStyle = color;
            ctx.font = `${size}px Microsoft YaHei`;
            ctx.textBaseline = 'top';
            ctx.fillText(text, x, y);
            ctx.restore();
        }

        function cancelActiveTextInput() {
            if (!activeTextInput) {
                return;
            }
            logTextTool('cancelActiveTextInput called');
            activeTextInput.remove();
            activeTextInput = null;
        }

        function createTextInput(x, y) {
            commitActiveTextInput();

            // 将画布坐标转换为显示坐标
            const displayX = x * canvasScale;
            const displayY = y * canvasScale;
            
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'text-input';
            input.style.left = `${displayX}px`;
            input.style.top = `${displayY}px`;
            input.style.minWidth = '180px';
            input.style.height = `${Math.max(26, lineWidth * 6) * canvasScale}px`;
            input.style.color = currentColor;
            input.style.fontSize = `${Math.max(14, lineWidth * 6) * canvasScale}px`;
            input.placeholder = '输入文字后按 Enter';
            input.dataset.x = String(x); // 保存原始画布坐标
            input.dataset.y = String(y);
            input.dataset.color = currentColor;
            input.dataset.size = String(Math.max(14, lineWidth * 6));
            canvasShell.appendChild(input);
            activeTextInput = input;
            drawCanvas.style.cursor = 'text';
            logTextTool('createTextInput created', { x, y, color: currentColor, size: input.dataset.size });

            input.focus();
            input.addEventListener('keydown', (e) => {
                logTextTool(`input keydown: ${e.key}`);
                if (e.key === 'Enter') {
                    e.preventDefault();
                    commitActiveTextInput();
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    cancelActiveTextInput();
                }
            });

            input.addEventListener('blur', () => {
                // Keep input visible after blur; explicit Enter/tool switch controls commit.
                if (activeTextInput === input) {
                    logTextTool('input blur (kept active, waiting explicit commit)');
                }
            });
        }

        function updateToolCursor() {

                drawCanvas.style.cursor = 'none';

                drawCanvas.style.cursor = 'crosshair';
            }
        }

        function updateEraserCursorByPoint(x, y) {
            const visible = currentTool === 'eraser';
            eraserCursor.style.display = visible ? 'block' : 'none';
            if (!visible) {
                return;
            }

            // 将画布坐标转换为显示坐标

            const displayY = y * canvasScale;
            const size = Math.max(8, lineWidth * 2) * canvasScale;
            eraserCursor.style.width = `${size}px`;

        function getCanvasPoint(e) {
            const rect = drawCanvas.getBoundingClientRect();
            // 根据缩放比例转换鼠标坐标到实际画布坐标
            const x = Math.round((e.clientX - rect.left) / canvasScale);
            const y = Math.round((e.clientY - rect.top) / canvasScale);
            return {
                x: Math.max(0, Math.min(x, drawCanvas.width)),
                y: Math.max(0, Math.min(y, drawCanvas.height))
            };
        }

        drawCanvas.addEventListener('mousedown', (e) => {
            const point = getCanvasPoint(e);
            const x = point.x;
            const y = point.y;
            logTextTool('drawCanvas mousedown', { currentTool, x, y });

            if (currentTool === 'text') {
                e.preventDefault();
                createTextInput(x, y);
                return;
            }

            commitActiveTextInput();
            isDrawing = true;
            lastX = x;
            lastY = y;
            updateEraserCursorByPoint(x, y);
        });

        drawCanvas.addEventListener('mouseenter', (e) => {
            const point = getCanvasPoint(e);
            updateEraserCursorByPoint(point.x, point.y);
        });

        drawCanvas.addEventListener('mousemove', (e) => {
            const point = getCanvasPoint(e);
            updateEraserCursorByPoint(point.x, point.y);

            if (!isDrawing) {
                return;
            }

            const x = point.x;
            const y = point.y;

            ctx.save();
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            if (currentTool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.globalAlpha = 1;
                ctx.strokeStyle = 'rgba(0,0,0,1)';
                ctx.lineWidth = Math.max(8, lineWidth * 2);
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = currentTool === 'highlight' ? lineWidth * 4 : lineWidth;
                ctx.globalAlpha = currentTool === 'highlight' ? 0.3 : 1;
            }

            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.restore();

            lastX = x;
            lastY = y;
        });

        function stopDrawing() {
            isDrawing = false;
            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = 1;
        }

        drawCanvas.addEventListener('mouseup', stopDrawing);

        // Markdown 渲染函数
        function renderMarkdown(markdown) {
            if (!markdown) return '';

            let html = markdown;

            // 先处理代码块
            const codeBlocks = [];
            html = html.replace(/```([\s\S]*?)```/g, (match, code) => {
                const id = `CODE_BLOCK_${codeBlocks.length}`;
                codeBlocks.push({ id, code: code.trim() });
                return id;
            });

            // 处理行内代码
            const inlineCodes = [];
            html = html.replace(/`([^`\n]+)`/g, (match, code) => {
                const id = `INLINE_CODE_${inlineCodes.length}`;
                inlineCodes.push({ id, code });
                return id;
            });

            // 转义HTML特殊字符
            html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            // 恢复行内代码
            inlineCodes.forEach(({ id, code }) => {
                html = html.replace(id, `<code>${code}</code>`);
            });

            // 恢复代码块
            codeBlocks.forEach(({ id, code }) => {
                html = html.replace(id, `<pre><code>${code}</code></pre>`);
            });

            // 标题
            html = html.replace(/^###### (.*$)/gm, '<h6>$1</h6>');
            html = html.replace(/^##### (.*$)/gm, '<h5>$1</h5>');
            html = html.replace(/^#### (.*$)/gm, '<h4>$1</h4>');
            html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');

            // 粗体
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');

            // 斜体
            html = html.replace(/\*([^*\n]+?)\*/g, (match, text) => {
                if (match.includes('CODE_BLOCK') || match.includes('INLINE_CODE')) return match;
                return '<em>' + text + '</em>';
            });
            html = html.replace(/_([^_\n]+?)_/g, (match, text) => {
                if (match.includes('CODE_BLOCK') || match.includes('INLINE_CODE')) return match;
                return '<em>' + text + '</em>';
            });

            // 删除线
            html = html.replace(/~~(.+?)~~/g, '<del>$1</del>');

            // 链接
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');

            // 水平线
            html = html.replace(/^---$/gm, '<hr>');
            html = html.replace(/^\*\*\*$/gm, '<hr>');

            // 引用
            const quoteLines = html.split('\n');
            let inBlockquote = false;
            let processedLines = [];

            quoteLines.forEach(line => {
                if (line.trim().startsWith('&gt; ')) {
                    if (!inBlockquote) {
                        processedLines.push('<blockquote>');
                        inBlockquote = true;
                    }
                    processedLines.push(line.replace(/^&gt; /, ''));
                } else {
                    if (inBlockquote) {
                        processedLines.push('</blockquote>');
                        inBlockquote = false;
                    }
                    processedLines.push(line);
                }
            });
            if (inBlockquote) processedLines.push('</blockquote>');
            html = processedLines.join('\n');

            // 处理列表和段落
            const listLines = html.split('\n');
            let result = [];
            let listItems = [];
            let currentListType = null;

            const flushList = () => {
                if (listItems.length > 0 && currentListType) {
                    result.push(`<${currentListType}>${listItems.join('')}</${currentListType}>`);
                    listItems = [];
                    currentListType = null;
                }
            };

            listLines.forEach((line) => {
                const trimmed = line.trim();

                const olMatch = trimmed.match(/^(\d+)\. (.+)$/);
                if (olMatch) {
                    if (currentListType !== 'ol') {
                        flushList();
                        currentListType = 'ol';
                    }
                    listItems.push(`<li>${olMatch[2]}</li>`);
                    return;
                }

                const ulMatch = trimmed.match(/^[\*\-\+] (.+)$/);
                if (ulMatch) {
                    if (currentListType !== 'ul') {
                        flushList();
                        currentListType = 'ul';
                    }
                    listItems.push(`<li>${ulMatch[1]}</li>`);
                    return;
                }

                flushList();

                if (!trimmed) {
                    result.push('');
                } else if (trimmed.match(/^<(h[1-6]|pre|blockquote|hr|ul|ol|p)/)) {
                    result.push(trimmed);
                } else {
                    result.push(`<p>${trimmed}</p>`);
                }
            });

            flushList();

            html = result.join('\n');

            // 清理多余标签
            html = html.replace(/<p><\/p>/g, '');
            html = html.replace(/<p>(<h[1-6]|ul|ol|pre|blockquote|hr)/g, '$1');
            html = html.replace(/(<\/h[1-6]|<\/ul>|<\/ol>|<\/pre>|<\/blockquote>|<\/hr>)<\/p>/g, '$1');
            html = html.replace(/\n{3,}/g, '\n\n');

            return html;
        }

        saveCancelBtn.addEventListener('click', hideSavePanel);
        saveCloseX.addEventListener('click', hideSavePanel);
        saveBackdrop.addEventListener('click', hideSavePanel);

        // 拖拽保存面板
        saveHeader.addEventListener('mousedown', (e) => {
            if (e.target === saveCloseX) return;
            isDraggingSavePanel = true;
            const panelRect = savePanelContent.getBoundingClientRect();
            dragSavePanelOffsetX = e.clientX - panelRect.left;
            dragSavePanelOffsetY = e.clientY - panelRect.top;
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDraggingSavePanel) return;
            const panelRect = savePanelContent.getBoundingClientRect();
            const nextLeft = Math.max(0, Math.min(e.clientX - dragSavePanelOffsetX, window.innerWidth - panelRect.width));
            const nextTop = Math.max(0, Math.min(e.clientY - dragSavePanelOffsetY, window.innerHeight - panelRect.height));
            savePanelContent.style.left = `${nextLeft}px`;
            savePanelContent.style.top = `${nextTop}px`;
        });

        document.addEventListener('mouseup', () => {
            isDraggingSavePanel = false;
        });

        function showToast(message, type = 'success', duration = 1800) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;

            let icon;
            if (type === 'success') {
                icon = '✓';
            } else if (type === 'info') {
                icon = 'ℹ';
            } else {
                icon = '✗';
            }
            toast.innerHTML = `
                <div class="icon">${icon}</div>
                <div class="message">${message}</div>
            `;

            container.innerHTML = '';
            container.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, duration);
        }

        function extractFolderName(filePath) {
            if (!filePath) return '未知文件夹';
            const parts = filePath.split(/[\\/]/);
            // 返回倒数第二个部分（文件夹名）
            return parts.length >= 2 ? parts[parts.length - 2] : '根目录';
        }

        document.getElementById('finish-btn').addEventListener('click', async () => {
            commitActiveTextInput();
            try {
                await ipcRenderer.invoke('editor:finish', getCanvasDataUrl());
            } catch (error) {
                showResultModal('完成截图失败', error.message || String(error), { hideCopy: true });
            }
        });

        resultCopyBtn.addEventListener('click', () => {
            copyText(lastModalText);
        });

        resultCloseBtn.addEventListener('click', hideResultModal);
        resultCloseX.addEventListener('click', hideResultModal);
        resultBackdrop.addEventListener('click', hideResultModal);

        resultHeader.addEventListener('mousedown', (e) => {
            if (e.target === resultCloseX) {
                return;
            }
            isDraggingResultPanel = true;
            const panelRect = resultPanel.getBoundingClientRect();
            dragPanelOffsetX = e.clientX - panelRect.left;
            dragPanelOffsetY = e.clientY - panelRect.top;
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDraggingResultPanel) {
                return;
            }
            const panelRect = resultPanel.getBoundingClientRect();
            const nextLeft = Math.max(0, Math.min(e.clientX - dragPanelOffsetX, window.innerWidth - panelRect.width));
            const nextTop = Math.max(0, Math.min(e.clientY - dragPanelOffsetY, window.innerHeight - panelRect.height));
            resultPanel.style.left = `${nextLeft}px`;
            resultPanel.style.top = `${nextTop}px`;
        });

        document.addEventListener('mouseup', () => {
            isDraggingResultPanel = false;
        });

        document.getElementById('cancel-btn').addEventListener('click', async () => {
            cancelActiveTextInput();
            // 如果正在进行 AI 请求，取消请求而不是关闭窗口
            if (isLoading) {
                const cancelled = await ipcRenderer.invoke('editor:cancel-ai');
                if (cancelled) {
                    setLoading(false);
                    isLoading = false;
                    showToast('AI 解读已取消', 'info');
                }
            } else {
                ipcRenderer.send('editor:cancel');
            }
        });

        document.addEventListener('keydown', async (e) => {
            if (e.ctrlKey && e.key.toLowerCase() === 's') {
                e.preventDefault();
                document.getElementById('finish-btn').click();
                return;
            }

            if (e.key === 'Escape') {
                if (activeTextInput) {
                    cancelActiveTextInput();
                } else if (isLoading) {
                    // AI 请求进行中，取消请求
                    const cancelled = await ipcRenderer.invoke('editor:cancel-ai');
                    if (cancelled) {
                        setLoading(false);
                        isLoading = false;
                        showToast('AI 解读已取消', 'info');
                    }
                } else if (savePanel.style.display === 'block') {
                    hideSavePanel();
                } else if (resultModal.style.display === 'block') {
                    hideResultModal();
                } else {
                    document.getElementById('cancel-btn').click();
                }
            }
        });

        updateToolCursor();
    </script>
</body>
</html>
