<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI科研助手 研知</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="main_v3.css" />
  </head>
  <!-- 
    整体背景与环境光：
    - bg-[#0d130f]: 深色背景
    - text-white: 默认文字颜色
    - relative overflow-hidden: 为绝对定位的光晕做准备
  -->
  <body class="bg-[#0d130f] text-white relative overflow-hidden h-screen font-sans selection:bg-[#b4f465] selection:text-black">

    <!-- 
      环境光晕 (绝对底层 z-0) 
    -->
    <div class="absolute -top-40 -left-40 w-96 h-96 bg-green-500/20 rounded-full blur-[120px] pointer-events-none z-0"></div>
    <div class="absolute -bottom-40 -right-40 w-[30rem] h-[30rem] bg-green-500/10 rounded-full blur-[150px] pointer-events-none z-0"></div>

    <!-- 
      主内容容器 (relative z-10) 
      flex 布局，三栏结构
    -->
    <div class="app-container relative z-10 flex h-full p-6 gap-6">
      
      <!-- ================= 左侧边栏 ================= -->
      <aside class="left-panel w-[320px] min-w-[320px] flex flex-col bg-white/[0.03] backdrop-blur-xl border border-white/[0.08] shadow-2xl shadow-black/50 rounded-3xl p-6 transition-all duration-300 relative group/left">
        
        <!-- 折叠按钮 -->
        <button id="leftCollapseBtn" class="collapse-btn absolute -right-3 top-1/2 -translate-y-1/2 w-6 h-12 bg-[#1f2937] border border-white/10 rounded-r-xl flex items-center justify-center cursor-pointer hover:bg-[#b4f465] hover:text-black transition-colors z-20 opacity-0 group-hover/left:opacity-100" title="折叠/展开左侧栏">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>

        <!-- 标题区域 -->
        <div class="panel-header flex items-center justify-between mb-6 shrink-0">
          <h2 class="text-white font-semibold text-lg tracking-wide">文献储存情况</h2>
        </div>
        
        <!-- 搜索框 -->
        <div class="search-container relative mb-4 shrink-0 group">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-4 w-4 text-gray-500 group-focus-within:text-[#b4f465] transition-colors" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </div>
          <input type="text" id="searchInput" class="w-full bg-black/20 border border-white/10 text-gray-300 text-sm rounded-full focus:ring-1 focus:ring-[#b4f465] focus:border-[#b4f465] block w-full pl-10 p-2.5 transition-all outline-none placeholder-gray-600" placeholder="搜索文件..." />
        </div>

        <!-- 操作按钮组 -->
        <div class="action-buttons flex gap-3 mb-4 shrink-0 relative z-20">
          <!-- 打开按钮 -->
          <button id="uploadBtn" class="flex-1 bg-white/5 hover:bg-white/10 text-[#b4f465] border border-white/10 rounded-full py-2 px-4 flex items-center justify-center gap-2 transition-all text-sm h-10">
            <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9a2 2 0 00-2 2v5a2 2 0 01-2 2z" />
            </svg>
            <span>打开</span>
          </button>
          
          <!-- 新建按钮 & 下拉菜单 -->
          <div class="new-btn-wrapper relative flex-1">
            <button id="newFolderBtn" class="w-full bg-[#b4f465] hover:bg-[#9de445] text-green-950 font-medium rounded-full py-2 px-4 flex items-center justify-center gap-2 transition-colors shadow-lg shadow-green-500/20 text-sm h-10">
              <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" />
              </svg>
              <span>新建</span>
            </button>
            <!-- 下拉菜单 -->
            <div id="newDropdown" class="dropdown-menu absolute top-full left-0 w-full mt-2 bg-[#1f2937] border border-white/10 rounded-xl shadow-2xl p-2 hidden z-50">
              <div id="newFolderOption" class="dropdown-item flex items-center gap-2 p-2 rounded-lg hover:bg-white/10 cursor-pointer text-gray-300 hover:text-white transition-colors text-sm">
                <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m-9 1V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z" /></svg>
                <span>新建文件夹</span>
              </div>
              <div id="newNoteOption" class="dropdown-item has-submenu flex items-center justify-between p-2 rounded-lg hover:bg-white/10 cursor-pointer text-gray-300 hover:text-white transition-colors text-sm group">
                <div class="flex items-center gap-2">
                    <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                    <span>新建笔记</span>
                </div>
                <svg class="w-3 h-3 text-gray-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                
                <!-- 二级菜单 -->
                <div class="submenu absolute left-full top-0 ml-2 bg-[#1f2937] border border-white/10 rounded-xl shadow-2xl p-2 hidden group-hover:block min-w-[160px]">
                  <div id="newTemplateOption" class="dropdown-item flex items-center gap-2 p-2 rounded-lg hover:bg-white/10 cursor-pointer text-gray-300 hover:text-white transition-colors text-sm">
                    <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                    <span>选择模板</span>
                  </div>
                  <div id="newCustomTemplateOption" class="dropdown-item flex items-center gap-2 p-2 rounded-lg hover:bg-white/10 cursor-pointer text-gray-300 hover:text-white transition-colors text-sm">
                    <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    <span>自定义模板</span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- 刷新按钮 -->
          <button id="refreshBtn" class="w-10 h-10 bg-white/5 hover:bg-white/10 border border-white/10 rounded-full flex items-center justify-center text-gray-400 hover:text-white transition-all shrink-0" title="刷新">
            <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
          </button>
        </div>
        
        <!-- 文件夹状态 -->
        <div id="folderStatus" class="folder-status text-xs text-gray-500 mb-2 pl-2 flex items-center gap-2 shrink-0">
          <span id="statusDot" class="w-2 h-2 rounded-full bg-gray-600"></span>
          <span id="statusText">未打开文件夹</span>
        </div>

        <!-- 文件树 -->
        <div id="fileTree" class="file-tree flex-1 overflow-y-auto pr-1 space-y-1">
          <!-- 动态生成的内容将填充在这里 -->
        </div>

        <!-- 底部导航 -->
        <div class="bottom-nav mt-4 pt-4 border-t border-white/10 flex justify-around items-center shrink-0">
          <div id="navUser" class="nav-icon p-2 rounded-xl text-gray-500 hover:text-white hover:bg-white/5 cursor-pointer transition-all" title="用户">
            <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
          </div>
          <div id="navMain" class="nav-icon active p-2 rounded-xl text-[#b4f465] bg-[#b4f465]/10 shadow-[0_0_15px_rgba(180,244,101,0.2)] cursor-pointer transition-all" title="AI智能解释">
            <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" /></svg>
          </div>
          <div id="navRecommend" class="nav-icon p-2 rounded-xl text-gray-500 hover:text-white hover:bg-white/5 cursor-pointer transition-all" title="文献推荐">
            <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
          </div>
          <div id="navManage" class="nav-icon p-2 rounded-xl text-gray-500 hover:text-white hover:bg-white/5 cursor-pointer transition-all" title="知识管理">
            <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
          </div>
        </div>
      </aside>

      <!-- ================= 中间展示区 ================= -->
      <main class="middle-panel flex-1 flex flex-col bg-white/[0.02] backdrop-blur-xl border border-white/[0.05] shadow-2xl rounded-3xl p-6 relative overflow-hidden min-w-0">
        
        <div class="panel-header flex items-center justify-between mb-6 shrink-0">
          <h2 class="text-white font-semibold text-lg">展示区域</h2>
        </div>

        <div id="displayArea" class="display-area flex-1 border-2 border-dashed border-white/10 rounded-2xl flex flex-col items-center justify-center text-center p-8 bg-black/20 overflow-auto">
          <div class="empty-state">
            <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mb-6 mx-auto">
              <svg class="w-10 h-10 text-gray-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9a2 2 0 00-2 2v5a2 2 0 01-2 2z" />
              </svg>
            </div>
            <p class="text-gray-400 text-lg mb-2">暂无内容</p>
            <p class="text-gray-600 text-sm">请从左侧选择一个文件进行查看</p>
          </div>
        </div>
        
        <!-- 模板管理覆盖层 (默认隐藏) -->
        <div id="templateView" class="template-view absolute inset-0 bg-[#0d130f]/95 backdrop-blur-xl z-50 flex flex-col p-8 hidden">
          <div class="template-header mb-6">
            <h2 class="text-2xl font-bold text-white mb-2">笔记模板管理</h2>
            <p class="text-gray-400">创建和管理你的模板库</p>
          </div>
          <div id="templateGrid" class="template-grid grid grid-cols-[repeat(auto-fill,minmax(200px,1fr))] gap-6 flex-1 overflow-auto">
            <!-- 模板卡片将动态生成 -->
          </div>
          <button id="newTemplateBtn" class="mt-6 w-full py-3 bg-[#b4f465] hover:bg-[#9de445] text-green-950 font-bold rounded-xl transition-colors shadow-lg shadow-green-500/20">
            新建笔记模板
          </button>
        </div>
        
        <!-- 模板编辑器覆盖层 (默认隐藏) -->
        <div id="templateEditorView" class="template-editor-view absolute inset-0 bg-[#0d130f]/95 backdrop-blur-xl z-50 flex flex-col p-8 hidden">
          <div class="editor-header flex justify-between items-center mb-6">
            <div>
              <h2 id="editorTitle" class="text-xl font-bold text-white">新建自定义模板</h2>
            </div>
          </div>
          <div class="editor-content flex-1 flex flex-col gap-4">
            <div class="editor-field">
              <label class="block text-gray-400 mb-2 text-sm">标题</label>
              <input type="text" id="templateTitleInput" class="w-full bg-black/30 border border-white/10 rounded-xl p-3 text-white focus:border-[#b4f465] outline-none transition-colors" placeholder="请输入模板标题" />
            </div>
            <div class="editor-field flex-1 flex flex-col">
              <label class="block text-gray-400 mb-2 text-sm">正文内容</label>
              <textarea id="templateContentInput" class="flex-1 w-full bg-black/30 border border-white/10 rounded-xl p-4 text-white focus:border-[#b4f465] outline-none transition-colors resize-none font-mono" placeholder="请输入模板内容（Markdown格式）"></textarea>
            </div>
          </div>
          <div class="editor-actions flex gap-4 mt-6 justify-end">
            <button id="editorCancelBtn" class="px-6 py-2 border border-white/20 text-white rounded-lg hover:bg-white/5 transition-colors">取消</button>
            <button id="editorSaveBtn" class="px-6 py-2 bg-[#b4f465] text-green-950 font-bold rounded-lg hover:bg-[#9de445] transition-colors shadow-lg shadow-green-500/20">保存</button>
          </div>
        </div>
      </main>

      <!-- ================= 右侧 AI 栏 ================= -->
      <aside class="right-panel w-[360px] min-w-[360px] flex flex-col bg-white/[0.03] backdrop-blur-xl border border-white/[0.08] shadow-2xl shadow-black/50 rounded-3xl p-6 relative group/right shrink-0">
        
        <!-- 折叠按钮 -->
        <button id="rightCollapseBtn" class="collapse-btn absolute -left-3 top-1/2 -translate-y-1/2 w-6 h-12 bg-[#1f2937] border border-white/10 rounded-l-xl flex items-center justify-center cursor-pointer hover:bg-[#b4f465] hover:text-black transition-colors z-20 opacity-0 group-hover/right:opacity-100" title="折叠/展开右侧栏">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>

        <div class="panel-header flex items-center justify-between mb-6 shrink-0">
          <h2 class="text-white font-semibold text-lg flex items-center gap-2">
            <span class="w-1.5 h-4 bg-[#b4f465] rounded-full shadow-[0_0_8px_#b4f465]"></span>
            AI 智能解释
          </h2>
        </div>

        <!-- 聊天消息区 -->
        <div id="chatMessages" class="chat-messages flex-1 overflow-y-auto space-y-4 pr-2 mb-4 scroll-smooth">
          <!-- 动态消息 -->
        </div>

        <!-- 输入区 -->
        <div class="chat-input-container mt-auto pt-4 border-t border-white/10 shrink-0">
          <!-- 附件列表 -->
          <div id="attachmentList" class="attachment-list flex flex-wrap gap-2 mb-2"></div>
          
          <!-- 拖拽区域 -->
          <div id="fileDropZone" class="file-drop-zone border border-dashed border-white/10 rounded-xl p-2 text-center text-xs text-gray-500 mb-2 hover:border-[#b4f465]/50 hover:text-[#b4f465] transition-colors cursor-pointer">
            拖入文件或点击上传附件
          </div>
          
          <div class="input-wrapper flex items-center gap-3 bg-black/20 border border-white/10 rounded-2xl p-2 pl-4 focus-within:ring-1 focus-within:ring-[#b4f465]/50 focus-within:border-[#b4f465]/50 transition-all">
            <input type="text" id="chatInput" class="flex-1 bg-transparent border-none outline-none text-white text-sm placeholder-gray-600" placeholder="输入你的问题..." />
            
            <button id="sendBtn" class="w-10 h-10 bg-[#b4f465] hover:bg-[#9de445] rounded-xl flex items-center justify-center text-green-950 transition-transform hover:scale-105 shadow-lg shadow-green-500/20">
              <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 12h14M12 5l7 7-7 7" />
              </svg>
            </button>
          </div>
          
          <button id="templateBtn" class="mt-3 w-full py-2 bg-transparent border border-[#b4f465]/30 text-[#b4f465] text-xs rounded-full hover:bg-[#b4f465]/10 transition-colors flex items-center justify-center gap-2">
            <svg class="w-3 h-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
            使用笔记模板
          </button>
        </div>
      </aside>
    </div>

    <!-- Hidden file inputs -->
    <input type="file" id="fileInput" multiple style="display: none;" />
    <input type="file" id="folderInput" webkitdirectory multiple style="display: none;" />

    <script src="main.js"></script>
  </body>
</html>
