<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>主界面 - AI科研助手 研知 (Original Style)</title>
    <link rel="stylesheet" href="main_v1.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- Left Panel: Document Storage -->
      <aside class="left-panel">
        <button class="collapse-btn collapse-left-btn" id="leftCollapseBtn" title="折叠/展开左侧栏">
          <span class="collapse-arrow">◀</span>
        </button>
        <div class="panel-header">
          <h2>文献储存情况</h2>
        </div>
        
        <!-- Search Bar -->
        <div class="search-container">
          <img src="../../img/update.png" alt="Search" class="search-icon" />
          <input type="text" class="search-input" id="searchInput" placeholder="Search" />
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
          <button class="action-btn" id="uploadBtn" title="打开文件夹">
            <img src="../../img/Folder.png" alt="Open Folder" class="btn-icon" />
            <span>打开</span>
          </button>
          <div class="new-btn-wrapper" style="flex: 1; position: relative;">
            <button class="action-btn" id="newFolderBtn" title="新建" style="width: 100%;">
              <img src="../../img/new-folder.png" alt="New" class="btn-icon" />
              <span>新建</span>
            </button>
            <div class="dropdown-menu" id="newDropdown">
              <div class="dropdown-item" id="newFolderOption">
                <img src="../../img/Folder.png" alt="Folder" class="dropdown-icon" style="width: 14px; height: 14px; margin-right: 8px; filter: invert(1);" />
                <span>新建文件夹</span>
              </div>
              <div class="dropdown-item has-submenu" id="newNoteOption" style="display: flex; align-items: center; justify-content: space-between;">
                <div style="display: flex; align-items: center;">
                    <img src="../../img/chat-bot.png" alt="Note" class="dropdown-icon" style="width: 14px; height: 14px; margin-right: 8px; filter: invert(1);" />
                    <span>新建笔记</span>
                </div>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
                <div class="submenu" style="display: none; position: absolute; left: 100%; top: 0; background: #2d3748; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; min-width: 150px;">
                  <div class="dropdown-item" id="newTemplateOption">
                    <img src="../../img/file.png" alt="Template" class="dropdown-icon" style="width: 14px; height: 14px; margin-right: 8px; filter: invert(1);" />
                    <span>选择模板</span>
                  </div>
                  <div class="dropdown-item" id="newCustomTemplateOption">
                    <img src="../../img/new-folder.png" alt="Custom Template" class="dropdown-icon" style="width: 14px; height: 14px; margin-right: 8px; filter: invert(1);" />
                    <span>新建自定义模板</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <button class="action-btn refresh-btn" id="refreshBtn" title="刷新文件列表" style="flex: 0 0 32px;">
            <img src="../../img/update.png" alt="Refresh" class="btn-icon" id="refreshIcon" />
          </button>
        </div>
        
        <!-- 文件夹状态指示 -->
        <div class="folder-status" id="folderStatus" style="font-size: 12px; color: #666; margin-bottom: 8px; display: flex; align-items: center;">
          <span class="status-dot" id="statusDot" style="width: 8px; height: 8px; border-radius: 50%; background: #666; margin-right: 6px;"></span>
          <span class="status-text" id="statusText">未打开文件夹</span>
        </div>

        <!-- File Tree -->
        <div class="file-tree" id="fileTree">
          <!-- Folders and files will be dynamically generated -->
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
          <div class="nav-icon" id="navUser" title="用户">
            <img src="../../img/user.png" alt="User" />
          </div>
          <div class="nav-icon active" id="navMain" title="AI智能解释">
            <img src="../../img/解释icon.png" alt="Main" />
          </div>
          <div class="nav-icon" id="navRecommend" title="文献推荐">
            <img src="../../img/文献icon.png" alt="Recommend" />
          </div>
          <div class="nav-icon" id="navManage" title="知识管理">
            <img src="../../img/team.png" alt="Manage" />
          </div>
        </div>
      </aside>

      <!-- Middle Panel: Display Area -->
      <main class="middle-panel">
        <div class="panel-header" style="padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.1);">
          <h2>展示区域</h2>
        </div>
        <div class="display-area" id="displayArea">
          <div class="empty-state">
            <img src="../../img/Folder.png" alt="Folder" class="empty-icon" style="width: 64px; height: 64px; opacity: 0.2; filter: invert(1); margin-bottom: 16px;" />
            <p>选择一个文件内容进行查看</p>
          </div>
        </div>
        
        <!-- Template Selection View -->
        <div class="template-view" id="templateView" style="display: none; flex: 1; flex-direction: column; padding: 20px;">
          <div class="template-header" style="margin-bottom: 20px;">
            <h2>笔记模板管理</h2>
            <p style="color: #999; font-size: 13px;">创建和管理你的模板库</p>
          </div>
          <div class="template-grid" id="templateGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px;">
            <!-- Templates will be dynamically generated -->
          </div>
          <button class="new-template-btn" id="newTemplateBtn" style="margin-top: 20px; padding: 10px; background: #b4f465; border: none; border-radius: 4px; cursor: pointer;">新建笔记模板</button>
        </div>
        
        <!-- Template Editor View -->
        <div class="template-editor-view" id="templateEditorView" style="display: none; flex: 1; flex-direction: column; padding: 20px;">
          <div class="editor-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div class="editor-title-section">
              <h2 id="editorTitle">新建自定义模板</h2>
            </div>
          </div>
          <div class="editor-content" style="flex: 1; display: flex; flex-direction: column; gap: 16px;">
            <div class="editor-field">
              <label style="display: block; margin-bottom: 8px; color: #999;">标题</label>
              <input type="text" id="templateTitleInput" class="editor-input" placeholder="请输入模板标题" style="width: 100%; padding: 8px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); color: white;" />
            </div>
            <div class="editor-field" style="flex: 1; display: flex; flex-direction: column;">
              <label style="display: block; margin-bottom: 8px; color: #999;">正文内容</label>
              <textarea id="templateContentInput" class="editor-textarea" placeholder="请输入模板内容（Markdown格式）" style="flex: 1; width: 100%; padding: 8px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); color: white; resize: none;"></textarea>
            </div>
          </div>
          <div class="editor-actions" style="margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end;">
            <button class="editor-btn cancel-btn" id="editorCancelBtn" style="padding: 8px 16px; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; cursor: pointer;">取消</button>
            <button class="editor-btn save-btn" id="editorSaveBtn" style="padding: 8px 16px; background: #b4f465; border: none; color: black; cursor: pointer;">保存</button>
          </div>
        </div>
      </main>

      <!-- Right Panel: AI Smart Explanation -->
      <aside class="right-panel">
        <button class="collapse-btn collapse-right-btn" id="rightCollapseBtn" title="折叠/展开右侧栏">
          <span class="collapse-arrow">▶</span>
        </button>
        <div class="panel-header">
          <h2>AI 智能解释</h2>
        </div>

        <!-- Chat Messages -->
        <div class="chat-messages" id="chatMessages">
          <!-- Chat messages will be dynamically generated -->
        </div>

        <!-- Chat Input -->
        <div class="chat-input-container">
          <!-- 附件列表 -->
          <div class="attachment-list" id="attachmentList"></div>
          <div class="file-drop-zone" id="fileDropZone" style="border: 2px dashed rgba(255,255,255,0.1); padding: 10px; text-align: center; color: #666; font-size: 12px; margin-bottom: 8px; border-radius: 4px;">
            <p>拖入文件或从文件树选择添加附件</p>
          </div>
          <div class="input-wrapper">
            <input type="text" class="chat-input" id="chatInput" placeholder="输入你的问题..." />
            <button class="send-btn" id="sendBtn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
          <button class="template-btn" id="templateBtn" style="background: transparent; border: 1px dashed rgba(255,255,255,0.2); color: #999; padding: 6px; width: 100%; margin-top: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;">
            <img src="../../img/robot.png" alt="Template" class="template-icon" style="width: 14px; height: 14px; filter: invert(0.6);" />
            <span>笔记模板</span>
          </button>
        </div>
      </aside>
    </div>

    <!-- Hidden file input for upload -->
    <input type="file" id="fileInput" multiple style="display: none;" />
    <input type="file" id="folderInput" webkitdirectory multiple style="display: none;" />

    <script src="main.js"></script>
  </body>
</html>
