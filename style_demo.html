<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YanZhi - Motta Style Concept</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* 
        Tailwind 默认不支持所有 scrollbar 样式，这里补充自定义滚动条 
      */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      
      /* 隐藏 number input 的箭头 */
      input[type=number]::-webkit-inner-spin-button, 
      input[type=number]::-webkit-outer-spin-button { 
        -webkit-appearance: none; 
        margin: 0; 
      }
    </style>
  </head>
  <!-- 
    整体背景与环境光：
    - bg-[#0d130f]: 深色背景
    - text-white: 默认文字颜色
    - relative overflow-hidden: 为绝对定位的光晕做准备
  -->
  <body class="bg-[#0d130f] text-white relative overflow-hidden h-screen font-sans selection:bg-[#b4f465] selection:text-black">

    <!-- 
      环境光晕 (绝对底层 z-0) 
    -->
    <div class="absolute -top-40 -left-40 w-96 h-96 bg-green-500/20 rounded-full blur-[120px] pointer-events-none z-0"></div>
    <div class="absolute -bottom-40 -right-40 w-[30rem] h-[30rem] bg-green-500/10 rounded-full blur-[150px] pointer-events-none z-0"></div>

    <!-- 
      主内容容器 (relative z-10) 
      flex 布局，三栏结构
    -->
    <div class="app-container relative z-10 flex h-full p-6 gap-6">
      
      <!-- Left Panel: Document Storage -->
      <!-- 卡片毛玻璃质感 -->
      <aside class="left-panel w-[320px] min-w-[320px] flex flex-col bg-white/[0.03] backdrop-blur-xl border border-white/[0.08] shadow-2xl shadow-black/50 rounded-3xl p-6 transition-all duration-300">
        
        <!-- 标题区域 -->
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-white font-semibold text-lg tracking-wide">文献储存</h2>
          <!-- 折叠按钮 (模拟) -->
          <button class="text-gray-400 hover:text-[#b4f465] transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
        </div>
        
        <!-- Search Bar -->
        <div class="relative mb-6 group">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-4 w-4 text-gray-500 group-focus-within:text-[#b4f465] transition-colors" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </div>
          <input type="text" class="w-full bg-black/20 border border-white/10 text-gray-300 text-sm rounded-full focus:ring-1 focus:ring-[#b4f465] focus:border-[#b4f465] block w-full pl-10 p-2.5 transition-all outline-none placeholder-gray-600" placeholder="Search papers..." />
        </div>

        <!-- Action Buttons -->
        <div class="flex gap-3 mb-6">
          <!-- 主按钮 (新建) -->
          <button class="flex-1 bg-[#b4f465] hover:bg-[#9de445] text-green-950 font-medium rounded-full py-2.5 px-4 flex items-center justify-center gap-2 transition-colors shadow-lg shadow-green-500/20 group">
            <svg class="w-4 h-4 group-hover:rotate-90 transition-transform" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" />
            </svg>
            <span>新建</span>
          </button>
          
          <!-- 次按钮 (打开) -->
          <button class="flex-1 bg-white/5 hover:bg-white/10 text-[#b4f465] border border-white/10 rounded-full py-2.5 px-4 flex items-center justify-center gap-2 transition-all">
            <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9a2 2 0 00-2 2v5a2 2 0 01-2 2z" />
            </svg>
            <span>打开</span>
          </button>
        </div>
        
        <!-- File Tree -->
        <div class="flex-1 overflow-y-auto pr-2 space-y-1">
          <!-- 选中项 -->
          <div class="group flex items-center gap-3 p-3 rounded-2xl bg-[#b4f465]/10 border border-[#b4f465]/20 cursor-pointer transition-all">
             <div class="text-[#b4f465]">
               <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                 <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
               </svg>
             </div>
             <span class="text-[#b4f465] font-medium text-sm truncate">深度学习综述.pdf</span>
          </div>
          
          <!-- 普通项 -->
          <div class="group flex items-center gap-3 p-3 rounded-2xl hover:bg-white/5 border border-transparent hover:border-white/5 cursor-pointer transition-all">
             <div class="text-gray-500 group-hover:text-gray-300">
               <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                 <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
               </svg>
             </div>
             <span class="text-gray-400 group-hover:text-gray-200 text-sm truncate">Transformer.md</span>
          </div>

          <div class="group flex items-center gap-3 p-3 rounded-2xl hover:bg-white/5 border border-transparent hover:border-white/5 cursor-pointer transition-all">
             <div class="text-gray-500 group-hover:text-gray-300">
               <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                 <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
               </svg>
             </div>
             <span class="text-gray-400 group-hover:text-gray-200 text-sm truncate">实验数据_2024</span>
          </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="mt-4 pt-4 border-t border-white/10 flex justify-around items-center">
          <div class="p-2 rounded-xl text-gray-500 hover:text-white hover:bg-white/5 cursor-pointer transition-all">
            <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
          </div>
          <div class="p-2 rounded-xl text-[#b4f465] bg-[#b4f465]/10 shadow-[0_0_15px_rgba(180,244,101,0.2)] cursor-pointer transition-all">
            <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" /></svg>
          </div>
          <div class="p-2 rounded-xl text-gray-500 hover:text-white hover:bg-white/5 cursor-pointer transition-all">
            <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
          </div>
          <div class="p-2 rounded-xl text-gray-500 hover:text-white hover:bg-white/5 cursor-pointer transition-all">
            <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
          </div>
        </div>
      </aside>

      <!-- Middle Panel: Display Area -->
      <!-- 这里的背景稍微暗一点，或者透明度高一点 -->
      <main class="middle-panel flex-1 flex flex-col bg-white/[0.02] backdrop-blur-xl border border-white/[0.05] shadow-2xl rounded-3xl p-8 relative overflow-hidden">
        
        <div class="flex items-center justify-between mb-8">
          <h2 class="text-white font-semibold text-lg">展示区域</h2>
        </div>

        <div class="flex-1 border-2 border-dashed border-white/10 rounded-2xl flex flex-col items-center justify-center text-center p-8 bg-black/20">
          <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mb-6">
            <svg class="w-10 h-10 text-gray-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9a2 2 0 00-2 2v5a2 2 0 01-2 2z" />
            </svg>
          </div>
          <p class="text-gray-400 text-lg mb-2">暂无内容</p>
          <p class="text-gray-600 text-sm">请从左侧选择一个文件进行查看</p>
        </div>
      </main>

      <!-- Right Panel: AI Smart Explanation -->
      <aside class="right-panel w-[360px] min-w-[360px] flex flex-col bg-white/[0.03] backdrop-blur-xl border border-white/[0.08] shadow-2xl shadow-black/50 rounded-3xl p-6 relative">
        
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-white font-semibold text-lg flex items-center gap-2">
            <span class="w-1.5 h-4 bg-[#b4f465] rounded-full shadow-[0_0_8px_#b4f465]"></span>
            AI 智能解释
          </h2>
          <button class="text-gray-400 hover:text-[#b4f465] transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>

        <!-- Chat Messages -->
        <div class="flex-1 overflow-y-auto space-y-6 pr-2 mb-4">
          <!-- AI 消息 -->
          <div class="flex flex-col items-start gap-2 max-w-[90%]">
             <div class="bg-white/[0.06] border border-white/5 rounded-2xl rounded-tl-sm p-4 text-gray-300 text-sm leading-relaxed shadow-sm">
               你好！我是研知 AI 助手。有什么我可以帮你的吗？
             </div>
             <span class="text-xs text-gray-600 pl-1">刚刚</span>
          </div>

          <!-- 用户消息 -->
          <div class="flex flex-col items-end gap-2 max-w-[90%] self-end ml-auto">
             <div class="bg-[#b4f465] text-green-950 font-medium rounded-2xl rounded-tr-sm p-4 text-sm leading-relaxed shadow-lg shadow-green-500/10">
               帮我总结一下左侧选中的这篇论文。
             </div>
             <span class="text-xs text-gray-600 pr-1">10:42</span>
          </div>

          <!-- AI 消息 -->
          <div class="flex flex-col items-start gap-2 max-w-[90%]">
             <div class="bg-white/[0.06] border border-white/5 rounded-2xl rounded-tl-sm p-4 text-gray-300 text-sm leading-relaxed shadow-sm">
               <p class="mb-2">好的，正在分析 <span class="text-[#b4f465]">《深度学习综述.pdf》</span>...</p>
               <p>这篇论文主要讨论了 CNN 在图像识别领域的最新进展，包括：</p>
               <ul class="list-disc list-inside mt-2 space-y-1 text-gray-400">
                 <li>ViT 架构的演变</li>
                 <li>大规模预训练模型的效果</li>
                 <li>自监督学习的应用</li>
               </ul>
             </div>
             <span class="text-xs text-gray-600 pl-1">10:43</span>
          </div>
        </div>

        <!-- Chat Input -->
        <div class="mt-auto pt-4 border-t border-white/10">
          <div class="flex items-center gap-3 bg-black/20 border border-white/10 rounded-2xl p-2 pl-4 focus-within:ring-1 focus-within:ring-[#b4f465]/50 focus-within:border-[#b4f465]/50 transition-all">
            <input type="text" class="flex-1 bg-transparent border-none outline-none text-white text-sm placeholder-gray-600" placeholder="输入你的问题..." />
            
            <button class="w-10 h-10 bg-[#b4f465] hover:bg-[#9de445] rounded-xl flex items-center justify-center text-green-950 transition-transform hover:scale-105 shadow-lg shadow-green-500/20">
              <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 12h14M12 5l7 7-7 7" />
              </svg>
            </button>
          </div>
          
          <div class="flex justify-between items-center mt-3">
             <button class="text-xs text-gray-500 hover:text-[#b4f465] flex items-center gap-1 transition-colors">
               <svg class="w-3 h-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" /></svg>
               添加附件
             </button>
             <button class="text-xs text-[#b4f465] border border-[#b4f465]/20 hover:bg-[#b4f465]/10 px-3 py-1.5 rounded-full transition-colors flex items-center gap-1">
               <svg class="w-3 h-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
               笔记模板
             </button>
          </div>
        </div>
      </aside>
    </div>
  </body>
</html>
