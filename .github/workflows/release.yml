name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v1.0.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  macos-arm64:
    name: Build macOS arm64 release
    runs-on: macos-14

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build PaddleOCR.js browser assets
        run: npm run build:paddleocr-js

      - name: Restore PP-OCRv5 model cache
        uses: actions/cache@v4
        with:
          path: src/screenshot/vendor/paddleocr-js-models
          key: ppocrv5-models-${{ runner.os }}-${{ hashFiles('scripts/download-paddleocr-js-models.js') }}
          restore-keys: |
            ppocrv5-models-${{ runner.os }}-

      - name: Download PP-OCRv5 local models
        run: npm run download:paddleocr-js-models

      - name: Verify release OCR assets
        run: |
          test -s src/screenshot/vendor/paddleocr-js/paddleocr-js.bundle.js
          test -s src/screenshot/vendor/paddleocr-js/ort-wasm-simd-threaded.jsep.wasm
          test -s src/screenshot/vendor/paddleocr-js-models/PP-OCRv5_mobile_det_onnx.tar
          test -s src/screenshot/vendor/paddleocr-js-models/PP-OCRv5_mobile_rec_onnx.tar

      - name: Build Electron release package
        run: node node_modules/@electron-forge/cli/dist/electron-forge.js make --platform darwin --arch arm64

      - name: Locate release asset
        id: asset
        shell: bash
        run: |
          ASSET_PATH="$(find out/make/zip/darwin/arm64 -name '*.zip' -type f | head -n 1)"
          if [ -z "$ASSET_PATH" ]; then
            echo "No macOS arm64 zip was produced" >&2
            exit 1
          fi
          echo "path=$ASSET_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$ASSET_PATH")" >> "$GITHUB_OUTPUT"

      - name: Prepare release notes
        id: notes
        shell: bash
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          NOTES_FILE="release-notes.md"
          awk -v tag="$TAG" '
            $0 ~ "^## " tag "([[:space:]]|$)" { capture=1; print; next }
            capture && /^## v/ { exit }
            capture { print }
          ' CHANGELOG.md > "$NOTES_FILE"
          if [ ! -s "$NOTES_FILE" ]; then
            {
              echo "## 研知科研助手 $TAG"
              echo
              echo "Automated release for $TAG."
            } > "$NOTES_FILE"
          fi
          echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: 研知科研助手 ${{ steps.release.outputs.tag }}
          files: ${{ steps.asset.outputs.path }}
          fail_on_unmatched_files: true
          body_path: ${{ steps.notes.outputs.path }}
