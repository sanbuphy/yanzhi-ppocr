name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v1.0.4'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            os: macos-14
            platform: darwin
            arch: arm64
            asset_name: Yanzhi-Research-Assistant-macos-arm64
          - label: macOS x64
            os: macos-13
            platform: darwin
            arch: x64
            asset_name: Yanzhi-Research-Assistant-macos-x64
          - label: Windows x64
            os: windows-latest
            platform: win32
            arch: x64
            asset_name: Yanzhi-Research-Assistant-windows-x64
          - label: Linux x64
            os: ubuntu-latest
            platform: linux
            arch: x64
            asset_name: Yanzhi-Research-Assistant-linux-x64

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot rpm

      - name: Build PaddleOCR.js browser assets
        run: npm run build:paddleocr-js

      - name: Restore PP-OCRv5 model cache
        uses: actions/cache@v4
        with:
          path: src/screenshot/vendor/paddleocr-js-models
          key: ppocrv5-models-${{ runner.os }}-${{ hashFiles('scripts/download-paddleocr-js-models.js') }}
          restore-keys: |
            ppocrv5-models-${{ runner.os }}-

      - name: Download PP-OCRv5 local models
        run: npm run download:paddleocr-js-models

      - name: Verify release OCR assets
        shell: bash
        run: |
          test -s src/screenshot/vendor/paddleocr-js/paddleocr-js.bundle.js
          test -s src/screenshot/vendor/paddleocr-js/ort-wasm-simd-threaded.jsep.wasm
          test -s src/screenshot/vendor/paddleocr-js-models/PP-OCRv5_mobile_det_onnx.tar
          test -s src/screenshot/vendor/paddleocr-js-models/PP-OCRv5_mobile_rec_onnx.tar

      - name: Build native installer
        run: node node_modules/@electron-forge/cli/dist/electron-forge.js make --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}

      - name: Collect native release assets
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.release.outputs.tag }}"
          mkdir -p dist
          find out/make -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.deb' -o -name '*.rpm' \) -print0 | while IFS= read -r -d '' file; do
            ext="${file##*.}"
            target="dist/${{ matrix.asset_name }}-${TAG}.${ext}"
            cp "$file" "$target"
            test -s "$target"
          done
          count="$(find dist -type f | wc -l | tr -d ' ')"
          if [ "$count" = "0" ]; then
            echo "No native release assets were produced" >&2
            find out -maxdepth 5 -type f >&2 || true
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Prepare release notes
        id: notes
        shell: bash
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          NOTES_FILE="release-notes.md"
          awk -v tag="$TAG" '
            $0 ~ "^## " tag "([[:space:]]|$)" { capture=1; print; next }
            capture && /^## v/ { exit }
            capture { print }
          ' CHANGELOG.md > "$NOTES_FILE"
          if [ ! -s "$NOTES_FILE" ]; then
            {
              echo "## 研知科研助手 $TAG"
              echo
              echo "Automated release for $TAG."
            } > "$NOTES_FILE"
          fi
          echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: 研知科研助手 ${{ steps.release.outputs.tag }}
          files: release-assets/*
          fail_on_unmatched_files: true
          body_path: ${{ steps.notes.outputs.path }}
